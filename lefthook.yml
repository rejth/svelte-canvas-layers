# EXAMPLE USAGE:
#
#   Refer for explanation to following link:
#   https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    svelte-check:
      run: pnpm svelte-check --tsconfig ./tsconfig.json {staged_files}
    format:
      glob: 'src/**/*.{ts,js,svelte,css,scss,json,svg,html,md}'
      run: pnpm format {staged_files}
    lint:
      glob: 'src/**/*.{ts,js,svelte}'
      run: pnpm lint {staged_files}
